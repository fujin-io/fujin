services:
  fujin:
    image: fujin:nats_core-${BUILD_TAG}
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        FUJIN_CONNECTORS: github.com/fujin-io/fujin/public/plugins/connector/nats/core
        FUJIN_GO_TAGS: quic,tcp,grpc
    container_name: fujin
    environment:
      FUJIN_CONFIGURATOR: yaml
      FUJIN_CONFIGURATOR_YAML_PATHS: /assets/config/config-nats_core.yaml
    ports:
      - "4848:4848/udp"
      - "4849:4849"
    volumes:
      - ./assets:/assets
    restart: always