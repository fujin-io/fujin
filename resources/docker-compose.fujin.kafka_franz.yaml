services:
  fujin:
    image: fujin:kafka_franz-${BUILD_TAG}
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        FUJIN_CONNECTORS: github.com/fujin-io/fujin/public/plugins/connector/kafka/franz
        FUJIN_GO_TAGS: fujin,grpc,unix
    container_name: fujin
    environment:
      FUJIN_CONFIGURATOR: yaml
      FUJIN_CONFIGURATOR_YAML_PATHS: /assets/config/config-kafka_franz.yaml
    ports:
      - "4848:4848/udp"
      - "4849:4849"
      - "4850:4850"
    volumes:
      - ./assets:/assets
    restart: always