fujin:
  transports:
    - type: tcp
      enabled: true
      settings:
        addr: :4850
        fujin:
          ping_interval: 5s
          ping_timeout: 10s
          ping_max_retries: 5
          write_deadline: 10s
          force_terminate_timeout: 15s
grpc:
  enabled: false
connectors:
  faker_connector:
    type: faker
    connector_middlewares:
      - name: ratelimit
        config:
          requests_per_second: 10
