fujin:
  transports:
    - type: quic
      enabled: true
      settings:
        addr: :4848
        max_incoming_streams: 1000
        max_idle_timeout: 5s
        keepalive_period: 2s
        tls:
          enabled: true
          server_cert_pem_path: ./resources/assets/certs/fujin.io.pem
          server_key_pem_path: ./resources/assets/certs/fujin.io-key.pem
        fujin:
          ping_interval: 5s
          ping_timeout: 10s
          ping_stream: false
          ping_max_retries: 5
          write_deadline: 10s
          force_terminate_timeout: 15s
    - type: tcp
      enabled: true
      settings:
        addr: :4850
        fujin:
          ping_interval: 5s
          ping_timeout: 10s
          ping_max_retries: 5
          write_deadline: 10s
          force_terminate_timeout: 15s
    - type: unix
      enabled: true
      settings:
        path: /tmp/fujin.sock
        fujin:
          ping_interval: 5s
          ping_timeout: 10s
          ping_max_retries: 5
          write_deadline: 10s
          force_terminate_timeout: 15s
grpc:
  enabled: true
  addr: :4849
  max_recv_msg_size: 4194304
  max_send_msg_size: 4194304
  initial_window_size: 1048576
  initial_conn_window_size: 1048576
  server_keepalive:
    time: 2h
    timeout: 20s
    max_connection_idle: 15m
    max_connection_age: 30m
    max_connection_age_grace: 5s
  client_keepalive:
    min_time: 20s
    permit_without_stream: false
  observability_enabled: false
connectors:
  connector:
    type: kafka_franz
    # Whitelist of paths that clients can override via BIND command
    # Supports wildcards: clients.*.field matches clients.client1.field, clients.client2.field, etc.
    overridable:
      - clients.*.produce_topic
      - clients.*.consume_topics
      - clients.*.group
      - clients.*.transactional_id
    # Bind middlewares are applied to the bind request
    # They are particularly useful for authentication and authorization for example
    # Available middlewares:
    #   - auth_api_key: API key authentication
    # Each bind middleware can be disabled via config:
    #   - name: example_middleware
    #     disabled: true
    bind_middlewares:
      - name: auth_api_key
        api_key: supersecretkey
        enabled: false
    # Connector middlewares are applied to the connector
    # Available middlewares:
    #   - metrics: Prometheus metrics collection
    #   - tracing: OpenTelemetry distributed tracing
    # Each connector middleware can be disabled via config:
    #   - name: metrics
    #     disabled: true
    connector_middlewares:
      - name: prom
        enabled: false
      - name: otel
        enabled: false
    settings:
      common:
        # broker settings
        brokers: [localhost:9092, localhost:9093, localhost:9094]
        tls:
          enabled: false
          server_cert_pem_path: ./examples/assets/certs/fujin.io.pem
          server_key_pem_path: ./examples/assets/certs/fujin.io-key.pem
      clients:
        pub:
          # writer settings
          allow_auto_topic_creation: true
          produce_topic: my_pub_topic
          linger: 10ms # batching delay
          # transactional_id: fujin
          disable_idempotent_write: false
          max_buffered_records: 10000 # maximum buffered records
          ping_timeout: 5s # ping timeout
        sub:
          # reader settings
          consume_topics: [my_pub_topic]
          group: fujin2
          max_poll_records: 10000 # maximum poll records
          auto_commit_interval: 5s # auto commit interval
          auto_commit_marks: false # auto commit marks
          block_rebalance_on_poll: false # block rebalance on poll
          balancers: [cooperative_sticky] # balancers
          fetch_isolation_level: read_uncommited # fetch isolation level
          disable_auto_commit: true
